name: Feature request
description: Suggest an idea or improvement for Kright
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Opening this before a PR lets us agree on the
        approach first. Keep in mind Kright's hard constraints: **no network,
        nothing stored, secure fields never read.**
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case or frustration behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Kright do?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform(s)
      multiple: true
      options:
        - macOS
        - Windows
        - Both
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about (optional).
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: This does not require network access or storing what the user types
          required: true
