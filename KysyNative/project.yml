name: Kysy
options:
  bundleIdPrefix: com.kysy
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "D1429C0F8B8121EEC4B463D2EA6CF36130C80B84"
    PROVISIONING_PROFILE_SPECIFIER: ""
    DEVELOPMENT_TEAM: "V3275SDA78"
    ENABLE_HARDENED_RUNTIME: "NO"
targets:
  Kysy:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kysy.native
        PRODUCT_NAME: Kysy
    info:
      path: Sources/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Kysy
        CFBundleDisplayName: Kysy
        NSHumanReadableCopyright: ""
    entitlements:
      path: Sources/Kysy.entitlements
      properties:
        com.apple.security.app-sandbox: false
